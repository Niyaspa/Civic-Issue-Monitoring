{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-16 px-4 relative">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full opacity-10 blur-3xl" style="background: radial-gradient(circle, #4f8ef7, transparent);"></div>
        <div class="absolute bottom-0 -left-40 w-80 h-80 rounded-full opacity-10 blur-3xl" style="background: radial-gradient(circle, #7c5df7, transparent);"></div>
    </div>
    
    <div class="w-full max-w-md z-10 animate-fade-in">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-6" style="background: linear-gradient(135deg, #4f8ef7, #7c5df7);">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-black text-white mb-2">Welcome Back</h1>
            <p class="text-slate-400">Sign in with your email or username</p>
        </div>

        <!-- Card -->
        <div class="glass rounded-3xl p-8 glow-border">
            {% if form.errors %}
            <div class="mb-6 p-4 rounded-2xl text-red-400 text-sm font-medium flex items-center gap-3" style="background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.2);">
                <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                Invalid email/username or password.
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Email or Username</label>
                    <input type="text" name="username" id="id_username" required placeholder="your@email.com or username">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
                    <input type="password" name="password" id="password" required placeholder="••••••••">
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="w-full py-4 rounded-2xl text-base font-bold text-white mt-2 transition transform hover:scale-[1.02] active:scale-95" style="background: linear-gradient(135deg, #4f8ef7, #7c5df7); box-shadow: 0 8px 32px rgba(79,142,247,0.3);">
                    Sign In
                </button>
            </form>
            <p class="text-center text-slate-500 text-sm mt-6">
                Don't have an account? <a href="{% url 'signup' %}" class="text-blue-400 hover:text-blue-300 font-semibold transition">Create one →</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
